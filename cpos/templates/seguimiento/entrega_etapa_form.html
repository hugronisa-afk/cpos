{% extends 'layouts/app.html' %}

{% block content %}
<div class="page-head"><div><h2>Subir entrega · {{ etapa.nombre }}</h2><p>Proyecto: {{ proyecto.tema }}</p></div></div>
<div class="card">
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.non_field_errors }}
    {% for field in form %}
      <div class="field">
        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field }}
        {{ field.errors }}
      </div>
    {% endfor %}
    <div class="actions">
      <button class="btn" type="submit">Enviar entrega</button>
      <button class="btn secondary" type="button" onclick="history.back()">Cancelar</button>
    </div>
  </form>
</div>
{% endblock %}
